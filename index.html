<style>
  :root{
    --border:#e4e4e0; --bg:#f2f2ef; --accent:#1e2f3c; --muted:#7a7a76;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei","Segoe UI",Helvetica,Arial,sans-serif;display:flex;flex-direction:column;}

  header .tabs button:hover{background:#f4f3ee;}
  header .tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  header .note{margin-left:auto;font-size:11.5px;color:var(--muted);}
  main{flex:1;min-height:0;position:relative;}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:var(--bg);}
  iframe.show{display:block;}
  @media (max-width:640px){ header{padding:0 10px;} header .note{display:none;} }
</style>

function decodeB64Utf8(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
// 寫進同源 iframe:about:blank 繼承本頁 origin,兩套工具原本的 localStorage 存檔照常可用。
const loaded = {};
function ensureLoaded(id, b64){
  if(loaded[id]) return;
  loaded[id] = true;
  const doc = document.getElementById(id).contentDocument;
  doc.open(); doc.write(decodeB64Utf8(b64)); doc.close();
}
function show(which){
  document.getElementById('frame3d').classList.toggle('show', which==='3d');
  document.getElementById('framefp').classList.toggle('show', which==='fp');
  document.getElementById('tab3d').classList.toggle('active', which==='3d');
  document.getElementById('tabfp').classList.toggle('active', which==='fp');
  if(which==='3d') ensureLoaded('frame3d', APP_3D_B64);
  else ensureLoaded('framefp', APP_FP_B64);
  try{ localStorage.setItem('usm_index_tab', which); }catch(e){}
}
document.getElementById('tab3d').addEventListener('click', ()=>show('3d'));
document.getElementById('tabfp').addEventListener('click', ()=>show('fp'));
// 回到上次使用的分頁
let initial = '3d';
try{ const t = localStorage.getItem('usm_index_tab'); if(t==='fp') initial='fp'; }catch(e){}
show(initial);
